[build]
  publish = "."
  command = "echo 'No build command needed'"

# Redirect root to home page
[[redirects]]
  from = "/"
  to = "/index.html"
  status = 200

# Feature page redirects
[[redirects]]
  from = "/text-to-speech"
  to = "/text_to_speech/index.html"
  status = 200

[[redirects]]
  from = "/speech-to-text"
  to = "/speech_to_text/index.html"
  status = 200

[[redirects]]
  from = "/translate-and-speak"
  to = "/translate_and_speak/index.html"
  status = 200

[[redirects]]
  from = "/text-to-sign-language"
  to = "/text_to_sign_language/index.html"
  status = 200
