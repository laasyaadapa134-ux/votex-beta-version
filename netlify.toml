[build]
  publish = "."
  command = "echo 'No build command needed'"

# Redirect root to home page
[[redirects]]
  from = "/"
  to = "/index.html"
  status = 200

# Redirect old dashed URLs to underscore URLs (permanent redirect)
[[redirects]]
  from = "/text-to-speech/*"
  to = "/text_to_speech/:splat"
  status = 301

[[redirects]]
  from = "/text-to-speech"
  to = "/text_to_speech/"
  status = 301

[[redirects]]
  from = "/speech-to-text/*"
  to = "/speech_to_text/:splat"
  status = 301

[[redirects]]
  from = "/speech-to-text"
  to = "/speech_to_text/"
  status = 301

[[redirects]]
  from = "/translate-and-speak/*"
  to = "/translate_and_speak/:splat"
  status = 301

[[redirects]]
  from = "/translate-and-speak"
  to = "/translate_and_speak/"
  status = 301

[[redirects]]
  from = "/text-to-sign-language/*"
  to = "/text_to_sign_language/:splat"
  status = 301

[[redirects]]
  from = "/text-to-sign-language"
  to = "/text_to_sign_language/"
  status = 301
