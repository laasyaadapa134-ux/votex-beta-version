<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Professional ASL Avatar</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      overflow: hidden;
    }
    #avatar-container {
      width: 100vw;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    #info {
      position: fixed;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(0, 0, 0, 0.7);
      color: white;
      padding: 15px 30px;
      border-radius: 10px;
      font-size: 18px;
      font-weight: 600;
      backdrop-filter: blur(10px);
    }
  </style>
</head>
<body>
  <div id="avatar-container"></div>
  <div id="info">Professional 3D ASL Avatar - Right Arm Waving</div>

  <script src="/text-to-sign-language/vendor/three.min.js"></script>
  
  <script>
    // Setup scene
    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x1a1a2e);
    
    // Setup camera
    const camera = new THREE.PerspectiveCamera(
      40,
      window.innerWidth / window.innerHeight,
      0.1,
      100
    );
    camera.position.set(0, 1.3, 4);
    camera.lookAt(0, 1.1, 0);
    
    // Setup renderer
    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(window.devicePixelRatio);
    document.getElementById('avatar-container').appendChild(renderer.domElement);
    
    // Handle resize
    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });
    
    // Professional lighting setup
    const ambientLight = new THREE.AmbientLight(0xffffff, 0.7);
    scene.add(ambientLight);
    
    const keyLight = new THREE.DirectionalLight(0xffffff, 0.9);
    keyLight.position.set(4, 6, 5);
    scene.add(keyLight);
    
    const fillLight = new THREE.DirectionalLight(0x88ccff, 0.4);
    fillLight.position.set(-3, 2, 2);
    scene.add(fillLight);
    
    const rimLight = new THREE.PointLight(0x22d3ee, 1.2, 20);
    rimLight.position.set(-2, 3, -2);
    scene.add(rimLight);
    
    // Avatar group
    const avatar = new THREE.Group();
    scene.add(avatar);
    
    // Materials
    const skinMat = new THREE.MeshStandardMaterial({
      color: 0xf4c4a0,
      metalness: 0.1,
      roughness: 0.8
    });
    
    const bodyMat = new THREE.MeshStandardMaterial({
      color: 0xe2e8f0,
      emissive: 0x1e293b,
      emissiveIntensity: 0.15,
      metalness: 0.15,
      roughness: 0.6
    });
    
    const leftArmMat = new THREE.MeshStandardMaterial({
      color: 0x60a5fa,
      emissive: 0x3b82f6,
      emissiveIntensity: 0.2,
      metalness: 0.1,
      roughness: 0.5
    });
    
    const rightArmMat = new THREE.MeshStandardMaterial({
      color: 0x4ade80,
      emissive: 0x22c55e,
      emissiveIntensity: 0.2,
      metalness: 0.1,
      roughness: 0.5
    });
    
    const legMat = new THREE.MeshStandardMaterial({
      color: 0x94a3b8,
      emissive: 0x64748b,
      emissiveIntensity: 0.15,
      metalness: 0.12,
      roughness: 0.6
    });
    
    // Create sphere helper
    function createSphere(radius, material) {
      return new THREE.Mesh(
        new THREE.SphereGeometry(radius, 20, 20),
        material
      );
    }
    
    // Create cylinder helper
    function createCylinder(height, radius, material) {
      return new THREE.Mesh(
        new THREE.CylinderGeometry(radius, radius, height, 12),
        material
      );
    }
    
    // HEAD
    const head = createSphere(0.16, skinMat);
    head.position.y = 1.78;
    avatar.add(head);
    
    // NECK
    const neck = createCylinder(0.12, 0.04, bodyMat);
    neck.position.y = 1.62;
    avatar.add(neck);
    
    // UPPER TORSO
    const upperTorso = createCylinder(0.4, 0.14, bodyMat);
    upperTorso.position.y = 1.35;
    avatar.add(upperTorso);
    
    // LOWER TORSO
    const lowerTorso = createCylinder(0.35, 0.12, bodyMat);
    lowerTorso.position.y = 0.975;
    avatar.add(lowerTorso);
    
    // LEFT SHOULDER
    const leftShoulder = createSphere(0.045, bodyMat);
    leftShoulder.position.set(-0.18, 1.5, 0);
    avatar.add(leftShoulder);
    
    // LEFT UPPER ARM
    const leftUpperArm = createCylinder(0.35, 0.035, leftArmMat);
    leftUpperArm.position.set(-0.28, 1.25, 0);
    leftUpperArm.rotation.z = -0.15;
    avatar.add(leftUpperArm);
    
    // LEFT ELBOW
    const leftElbow = createSphere(0.04, leftArmMat);
    leftElbow.position.set(-0.37, 1.0, 0.05);
    avatar.add(leftElbow);
    
    // LEFT FOREARM
    const leftForearm = createCylinder(0.3, 0.03, leftArmMat);
    leftForearm.position.set(-0.44, 0.85, 0.1);
    leftForearm.rotation.z = -0.1;
    avatar.add(leftForearm);
    
    // LEFT HAND
    const leftHand = createSphere(0.05, new THREE.MeshStandardMaterial({
      color: 0x3b82f6,
      emissive: 0x2563eb,
      emissiveIntensity: 0.25
    }));
    leftHand.position.set(-0.5, 0.68, 0.14);
    avatar.add(leftHand);
    
    // RIGHT SHOULDER
    const rightShoulder = createSphere(0.045, bodyMat);
    rightShoulder.position.set(0.18, 1.5, 0);
    avatar.add(rightShoulder);
    
    // RIGHT UPPER ARM (animated)
    const rightUpperArm = createCylinder(0.35, 0.035, rightArmMat);
    rightUpperArm.position.set(0.28, 1.25, 0);
    rightUpperArm.rotation.z = 0.15;
    avatar.add(rightUpperArm);
    
    // RIGHT ELBOW (animated)
    const rightElbow = createSphere(0.04, rightArmMat);
    rightElbow.position.set(0.37, 1.0, 0.05);
    avatar.add(rightElbow);
    
    // RIGHT FOREARM (animated)
    const rightForearm = createCylinder(0.3, 0.03, rightArmMat);
    rightForearm.position.set(0.44, 0.85, 0.1);
    rightForearm.rotation.z = 0.1;
    avatar.add(rightForearm);
    
    // RIGHT HAND (animated)
    const rightHand = createSphere(0.05, new THREE.MeshStandardMaterial({
      color: 0x22c55e,
      emissive: 0x16a34a,
      emissiveIntensity: 0.25
    }));
    rightHand.position.set(0.5, 0.68, 0.14);
    avatar.add(rightHand);
    
    // LEFT LEG
    const leftUpperLeg = createCylinder(0.4, 0.045, legMat);
    leftUpperLeg.position.set(-0.08, 0.6, 0);
    avatar.add(leftUpperLeg);
    
    const leftKnee = createSphere(0.04, legMat);
    leftKnee.position.set(-0.09, 0.38, 0);
    avatar.add(leftKnee);
    
    const leftLowerLeg = createCylinder(0.35, 0.035, legMat);
    leftLowerLeg.position.set(-0.1, 0.2, 0);
    avatar.add(leftLowerLeg);
    
    const leftFoot = createSphere(0.045, legMat);
    leftFoot.position.set(-0.1, 0.02, 0.03);
    avatar.add(leftFoot);
    
    // RIGHT LEG
    const rightUpperLeg = createCylinder(0.4, 0.045, legMat);
    rightUpperLeg.position.set(0.08, 0.6, 0);
    avatar.add(rightUpperLeg);
    
    const rightKnee = createSphere(0.04, legMat);
    rightKnee.position.set(0.09, 0.38, 0);
    avatar.add(rightKnee);
    
    const rightLowerLeg = createCylinder(0.35, 0.035, legMat);
    rightLowerLeg.position.set(0.1, 0.2, 0);
    avatar.add(rightLowerLeg);
    
    const rightFoot = createSphere(0.045, legMat);
    rightFoot.position.set(0.1, 0.02, 0.03);
    avatar.add(rightFoot);
    
    // FINGERS - LEFT HAND
    for (let i = 0; i < 5; i++) {
      const angle = (i - 2) * 0.15;
      const fingerLength = 0.05;
      
      const finger = createCylinder(fingerLength, 0.008, leftArmMat);
      finger.position.set(
        -0.5 + Math.sin(angle) * 0.035,
        0.65,
        0.16 + Math.cos(angle) * 0.015
      );
      finger.rotation.x = angle;
      finger.rotation.z = -0.2;
      avatar.add(finger);
    }
    
    // FINGERS - RIGHT HAND
    for (let i = 0; i < 5; i++) {
      const angle = (i - 2) * 0.15;
      const fingerLength = 0.05;
      
      const finger = createCylinder(fingerLength, 0.008, rightArmMat);
      finger.position.set(
        0.5 + Math.sin(angle) * 0.035,
        0.65,
        0.16 + Math.cos(angle) * 0.015
      );
      finger.rotation.x = angle;
      finger.rotation.z = 0.2;
      avatar.add(finger);
    }
    
    // Animation
    let time = 0;
    
    function animate() {
      requestAnimationFrame(animate);
      time += 0.016;
      
      // Wave right arm
      const wave = Math.sin(time * 2.5) * 0.6;
      
      // Animate right elbow
      rightElbow.position.y = 1.0 + wave * 0.2;
      rightElbow.position.x = 0.37 + Math.abs(wave) * 0.05;
      rightElbow.position.z = 0.05 + Math.abs(wave) * 0.15;
      
      // Animate right forearm
      rightForearm.position.y = 0.85 + wave * 0.25;
      rightForearm.position.x = 0.44 + Math.abs(wave) * 0.07;
      rightForearm.position.z = 0.1 + Math.abs(wave) * 0.2;
      rightForearm.rotation.z = 0.1 + wave * 0.3;
      rightForearm.rotation.x = -wave * 0.2;
      
      // Animate right hand
      rightHand.position.y = 0.68 + wave * 0.4;
      rightHand.position.x = 0.5 + Math.abs(wave) * 0.1;
      rightHand.position.z = 0.14 + Math.abs(wave) * 0.25;
      
      // Animate right upper arm
      rightUpperArm.position.y = 1.25 + wave * 0.1;
      rightUpperArm.rotation.z = 0.15 + wave * 0.2;
      rightUpperArm.rotation.x = -wave * 0.15;
      
      // Subtle head bob
      head.position.y = 1.78 + Math.sin(time * 1.5) * 0.01;
      head.rotation.y = Math.sin(time * 0.8) * 0.05;
      
      renderer.render(scene, camera);
    }
    
    animate();
    
    console.log('Professional ASL Avatar loaded successfully!');
  </script>
</body>
</html>
