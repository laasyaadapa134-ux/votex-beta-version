<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Simple Avatar Test</title>
  <style>
    body {
      margin: 0;
      padding: 0;
      background: #1a1a2e;
      color: white;
      font-family: Arial, sans-serif;
      overflow: hidden;
    }
    #container {
      width: 100vw;
      height: 100vh;
      background: linear-gradient(to bottom, #0a0e27 0%, #1a1a2e 100%);
    }
    #log {
      position: fixed;
      bottom: 20px;
      left: 20px;
      right: 20px;
      max-height: 150px;
      overflow-y: auto;
      background: rgba(22, 33, 62, 0.9);
      padding: 15px;
      border-radius: 10px;
      font-family: monospace;
      font-size: 12px;
      backdrop-filter: blur(10px);
    }
    .success { color: #22c55e; }
    .error { color: #ef4444; }
    #title {
      position: fixed;
      top: 20px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 24px;
      font-weight: bold;
      z-index: 100;
      text-shadow: 0 2px 10px rgba(0,0,0,0.5);
    }
  </style>
</head>
<body>
  <div id="title">3D ASL Avatar - Professional View</div>
  <div id="container"></div>
  <div id="log"></div>

  <script src="/text-to-sign-language/vendor/three.min.js"></script>
  
  <script>
    const log = document.getElementById('log');
    
    function addLog(message, type = 'info') {
      const div = document.createElement('div');
      div.className = type;
      div.textContent = new Date().toLocaleTimeString() + ' - ' + message;
      log.appendChild(div);
      console.log(message);
    }

    addLog('Step 1: Page loaded');

    // Check if THREE loaded
    if (typeof THREE === 'undefined') {
      addLog('ERROR: THREE.js not loaded!', 'error');
    } else {
      addLog('SUCCESS: THREE.js loaded (Version: ' + THREE.REVISION + ')', 'success');
      
      try {
        // Create scene
        addLog('Step 2: Creating scene...');
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x08111f);
        addLog('SUCCESS: Scene created', 'success');
        
        // Create camera
        addLog('Step 3: Creating camera...');
        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 1.4, 3.5);
        camera.lookAt(0, 1.2, 0);
        addLog('SUCCESS: Camera created', 'success');
        
        // Create renderer
        addLog('Step 4: Creating renderer...');
        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        const container = document.getElementById('container');
        container.appendChild(renderer.domElement);
        addLog('SUCCESS: Renderer created', 'success');
        
        // Handle window resize
        window.addEventListener('resize', () => {
          camera.aspect = window.innerWidth / window.innerHeight;
          camera.updateProjectionMatrix();
          renderer.setSize(window.innerWidth, window.innerHeight);
        });
        
        // Add lighting
        addLog('Step 5: Adding professional lighting...');
        const ambient = new THREE.AmbientLight(0xffffff, 0.6);
        const directional = new THREE.DirectionalLight(0xffffff, 0.8);
        directional.position.set(3, 5, 4);
        const fill = new THREE.DirectionalLight(0x6bb6ff, 0.3);
        fill.position.set(-3, 1, -2);
        scene.add(ambient, directional, fill);
        addLog('SUCCESS: Professional lighting added', 'success');
        
        // Create full stick figure with bones and joints
        addLog('Step 6: Creating simple stick figure...');
        
        // All joints and bones
        const joints = {};
        const bones = [];
        
        // Helper to create joint
        function createJoint(x, y, z, size, color) {
          const geo = new THREE.SphereGeometry(size, 12, 12);
          const mat = new THREE.MeshStandardMaterial({ 
            color: color,
            emissive: color,
            emissiveIntensity: 0.2
          });
          const mesh = new THREE.Mesh(geo, mat);
          mesh.position.set(x, y, z);
          scene.add(mesh);
          return mesh;
        }
        
        // Helper to create bone
        function createBone(start, end, radius, color) {
          const direction = new THREE.Vector3().subVectors(end, start);
          const length = direction.length();
          const geo = new THREE.CylinderGeometry(radius, radius, length, 8);
          const mat = new THREE.MeshStandardMaterial({ 
            color: color,
            emissive: color,
            emissiveIntensity: 0.1
          });
          const mesh = new THREE.Mesh(geo, mat);
          
          mesh.position.copy(start).add(direction.multiplyScalar(0.5));
          mesh.quaternion.setFromUnitVectors(
            new THREE.Vector3(0, 1, 0),
            direction.normalize()
          );
          scene.add(mesh);
          return mesh;
        }
        
        // Body joints (white/gray)
        joints.head = createJoint(0, 2.0, 0, 0.15, 0xf1c7a6);
        joints.neck = createJoint(0, 1.7, 0, 0.05, 0xe2e8f0);
        joints.chest = createJoint(0, 1.4, 0, 0.06, 0xe2e8f0);
        joints.spine = createJoint(0, 1.0, 0, 0.05, 0xe2e8f0);
        joints.hips = createJoint(0, 0.7, 0, 0.06, 0xe2e8f0);
        
        // Left arm (blue)
        joints.leftShoulder = createJoint(-0.15, 1.4, 0, 0.05, 0x60a5fa);
        joints.leftElbow = createJoint(-0.35, 1.1, 0.1, 0.04, 0x60a5fa);
        joints.leftWrist = createJoint(-0.5, 0.85, 0.15, 0.04, 0x3b82f6);
        
        // Right arm (green) - this will wave
        joints.rightShoulder = createJoint(0.15, 1.4, 0, 0.05, 0x4ade80);
        joints.rightElbow = createJoint(0.35, 1.1, 0.1, 0.04, 0x4ade80);
        joints.rightWrist = createJoint(0.5, 0.85, 0.15, 0.04, 0x22c55e);
        
        // Left leg (gray)
        joints.leftHip = createJoint(-0.08, 0.65, 0, 0.05, 0x94a3b8);
        joints.leftKnee = createJoint(-0.1, 0.35, 0, 0.04, 0x94a3b8);
        joints.leftAnkle = createJoint(-0.1, 0.05, 0, 0.04, 0x94a3b8);
        
        // Right leg (gray)
        joints.rightHip = createJoint(0.08, 0.65, 0, 0.05, 0x94a3b8);
        joints.rightKnee = createJoint(0.1, 0.35, 0, 0.04, 0x94a3b8);
        joints.rightAnkle = createJoint(0.1, 0.05, 0, 0.04, 0x94a3b8);
        
        // Create bones (spine and body)
        bones.push(createBone(joints.hips.position, joints.spine.position, 0.03, 0x64748b));
        bones.push(createBone(joints.spine.position, joints.chest.position, 0.03, 0x64748b));
        bones.push(createBone(joints.chest.position, joints.neck.position, 0.03, 0x94a3b8));
        bones.push(createBone(joints.neck.position, joints.head.position, 0.03, 0x94a3b8));
        
        // Arms
        bones.push(createBone(joints.chest.position, joints.leftShoulder.position, 0.025, 0x60a5fa));
        bones.push(createBone(joints.leftShoulder.position, joints.leftElbow.position, 0.025, 0x60a5fa));
        bones.push(createBone(joints.leftElbow.position, joints.leftWrist.position, 0.02, 0x3b82f6));
        
        bones.push(createBone(joints.chest.position, joints.rightShoulder.position, 0.025, 0x4ade80));
        const rightUpperArm = createBone(joints.rightShoulder.position, joints.rightElbow.position, 0.025, 0x4ade80);
        const rightLowerArm = createBone(joints.rightElbow.position, joints.rightWrist.position, 0.02, 0x22c55e);
        bones.push(rightUpperArm, rightLowerArm);
        
        // Legs
        bones.push(createBone(joints.hips.position, joints.leftHip.position, 0.025, 0x94a3b8));
        bones.push(createBone(joints.leftHip.position, joints.leftKnee.position, 0.025, 0x94a3b8));
        bones.push(createBone(joints.leftKnee.position, joints.leftAnkle.position, 0.02, 0x94a3b8));
        
        bones.push(createBone(joints.hips.position, joints.rightHip.position, 0.025, 0x94a3b8));
        bones.push(createBone(joints.rightHip.position, joints.rightKnee.position, 0.025, 0x94a3b8));
        bones.push(createBone(joints.rightKnee.position, joints.rightAnkle.position, 0.02, 0x94a3b8));
        
        // Add fingers to left hand
        const leftFingerJoints = [];
        for (let i = 0; i < 5; i++) {
          const spread = (i - 2) * 0.03;
          const base = createJoint(-0.5 + spread, 0.8, 0.18, 0.015, 0x3b82f6);
          const tip = createJoint(-0.52 + spread, 0.75, 0.22, 0.012, 0x2563eb);
          leftFingerJoints.push(base, tip);
          bones.push(createBone(base.position, tip.position, 0.01, 0x3b82f6));
        }
        
        // Add fingers to right hand
        const rightFingerJoints = [];
        for (let i = 0; i < 5; i++) {
          const spread = (i - 2) * 0.03;
          const base = createJoint(0.5 + spread, 0.8, 0.18, 0.015, 0x22c55e);
          const tip = createJoint(0.52 + spread, 0.75, 0.22, 0.012, 0x16a34a);
          rightFingerJoints.push(base, tip);
          bones.push(createBone(base.position, tip.position, 0.01, 0x22c55e));
        }
        
        addLog('SUCCESS: Stick figure with body, arms, legs, and fingers created!', 'success');
        
        // Animation with waving right arm
        addLog('Step 7: Starting waving animation...');
        let time = 0;
        let frameCount = 0;
        
        function updateBone(bone, start, end) {
          const direction = new THREE.Vector3().subVectors(end, start);
          const length = direction.length();
          bone.scale.y = length / 1; // Adjust for original cylinder height of 1
          bone.position.copy(start).add(direction.multiplyScalar(0.5));
          bone.quaternion.setFromUnitVectors(
            new THREE.Vector3(0, 1, 0),
            direction.normalize()
          );
        }
        
        function animate() {
          requestAnimationFrame(animate);
          time += 0.02;
          
          // Wave the right arm up and down
          const wave = Math.sin(time * 2.5) * 0.4;
          
          joints.rightElbow.position.y = 1.1 + wave * 0.15;
          joints.rightElbow.position.z = 0.1 + Math.abs(wave) * 0.1;
          
          joints.rightWrist.position.y = 0.85 + wave * 0.35;
          joints.rightWrist.position.z = 0.15 + Math.abs(wave) * 0.2;
          
          // Update right arm bones
          updateBone(rightUpperArm, joints.rightShoulder.position, joints.rightElbow.position);
          updateBone(rightLowerArm, joints.rightElbow.position, joints.rightWrist.position);
          
          // Move fingers with hand
          rightFingerJoints.forEach((joint, idx) => {
            const spread = (Math.floor(idx/2) - 2) * 0.03;
            if (idx % 2 === 0) { // base
              joint.position.y = 0.8 + wave * 0.35;
              joint.position.z = 0.18 + Math.abs(wave) * 0.2;
            } else { // tip
              joint.position.y = 0.75 + wave * 0.35;
              joint.position.z = 0.22 + Math.abs(wave) * 0.2;
            }
          });
          
          renderer.render(scene, camera);
          
          if (frameCount === 10) {
            addLog('SUCCESS: Right arm waving! Watch the green arm move up and down!', 'success');
          }
          frameCount++;
        }
        
        animate();
        
      } catch (error) {
        addLog('ERROR: ' + error.message, 'error');
        console.error(error);
      }
    }
  </script>
</body>
</html>
