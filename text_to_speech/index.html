// Load voices and ensure they're ready
let voicesLoaded = false;
function loadVoices() {
  return new Promise((resolve) => {
    let voices = speechSynthesis.getVoices();
    if (voices.length > 0) {
      voicesLoaded = true;
      resolve(voices);
      return;
    }
    
    speechSynthesis.onvoiceschanged = () => {
      voices = speechSynthesis.getVoices();
      voicesLoaded = true;
      resolve(voices);
    };
    
    // Fallback timeout
    setTimeout(() => {
      voices = speechSynthesis.getVoices();
      voicesLoaded = true;
      resolve(voices);
    }, 1000);
  });
}

// --- Text-to-Speech (basic) ---
async function speakText() {
  const text = inputText.value.trim();
  if (!text) {
    statusEl.textContent = 'Please enter some text.';
    return;
  }

  if (!('speechSynthesis' in window)) {
    statusEl.textContent = 'TTS not supported.';
    return;
  }

  speechSynthesis.cancel(); // stop anything previous

  // Ensure voices are loaded
  let voices = speechSynthesis.getVoices();
  if (voices.length === 0) {
    statusEl.textContent = 'Loading voices...';
    voices = await loadVoices();
  }

  const utter = new SpeechSynthesisUtterance(text);
  utter.lang = targetLang.value || 'en-US';

  console.log('speakText — voices available:', voices.length);

  // Auto-select best matching voice
  const selectedVoice = voices.find(v => v.lang === utter.lang) ||
                        voices.find(v => v.lang.startsWith(utter.lang.split('-')[0])) ||
                        voices[0];

  if (selectedVoice) {
    utter.voice = selectedVoice;
    console.log('Using voice:', selectedVoice.name, selectedVoice.lang);
  } else {
    console.warn('No voice found — browser default will be used');
  }

  statusEl.textContent = `Speaking (${utter.lang})...`;

  utter.onend = () => { statusEl.textContent = 'Ready'; };
  utter.onerror = (e) => {
    console.error('TTS error:', e.error);
    statusEl.textContent = 'Speech error: ' + (e.error || 'unknown');
  };

  speechSynthesis.speak(utter);
}

// --- Download audio as MP3 ---
async function downloadAudio() {
  const text = inputText.value.trim();
  if (!text) {
    statusEl.textContent = 'Please enter some text.';
    return;
  }

  // Check if running from file:// protocol
  if (window.location.protocol === 'file:') {
    statusEl.textContent = '⚠️ Download requires a web server. Use "Convert & Speak" to listen, or serve this file via HTTP.';
    setTimeout(() => { statusEl.textContent = 'Ready'; }, 5000);
    return;
  }

  // Check text length (Google TTS has a limit)
  if (text.length > 200) {
    statusEl.textContent = 'Text is too long. Please use less than 200 characters for download.';
    setTimeout(() => { statusEl.textContent = 'Ready'; }, 3000);
    return;
  }

  statusEl.textContent = 'Generating audio file...';
  
  try {
    // Get language code
    const langCode = targetLang.value || 'en-US';
    const langShort = langCode.split('-')[0];
    
    // Try alternative CORS proxies
    const corsProxies = [
      'https://corsproxy.io/?',
      'https://api.codetabs.com/v1/proxy?quest=',
      'https://cors-anywhere.herokuapp.com/'
    ];
    
    const ttsUrl = `https://translate.google.com/translate_tts?ie=UTF-8&client=tw-ob&tl=${langShort}&q=${encodeURIComponent(text)}`;
    
    let response = null;
    let lastError = null;
    
    // Try each proxy
    for (const proxy of corsProxies) {
      try {
        const proxiedUrl = proxy + encodeURIComponent(ttsUrl);
        response = await fetch(proxiedUrl, {
          method: 'GET',
          headers: {
            'Origin': window.location.origin
          }
        });
        
        if (response.ok) {
          break; // Success! Exit loop
        }
      } catch (err) {
        lastError = err;
        console.warn(`Proxy ${proxy} failed:`, err);
        continue; // Try next proxy
      }
    }
    
    if (!response || !response.ok) {
      throw lastError || new Error('All proxies failed');
    }
    
    // Get the audio blob
    const audioBlob = await response.blob();
    
    // Create download link
    const url = URL.createObjectURL(audioBlob);
    const a = document.createElement('a');
    a.href = url;
    a.download = `speech_${Date.now()}.mp3`;
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(url);
    
    statusEl.textContent = 'Audio downloaded successfully!';
    setTimeout(() => { statusEl.textContent = 'Ready'; }, 2000);
    
  } catch (error) {
    console.error('Download error:', error);
    statusEl.textContent = '⚠️ Download unavailable. Please use "Convert & Speak" button to listen instead.';
    setTimeout(() => { statusEl.textContent = 'Ready'; }, 4000);
  }
}

// Helper function to parse PDF files
async function parsePDF(file) {
  const arrayBuffer = await file.arrayBuffer();
  const pdf = await pdfjsLib.getDocument({ data: arrayBuffer }).promise;
  let fullText = '';
  
  for (let i = 1; i <= pdf.numPages; i++) {
    const page = await pdf.getPage(i);
    const textContent = await page.getTextContent();
    const pageText = textContent.items.map(item => item.str).join(' ');
    fullText += pageText + '\n';
  }
  
  return fullText;
}

    // Read text files directly

// ensure voices loaded so speak picks matching voice


  // Choose a voice by language and gender heuristics
  function chooseVoiceFor(voices, langCode, gender) {
    if (!voices || voices.length === 0) return null;
    const langPrefix = (langCode || 'en-US').toLowerCase();
    const shortLang = langPrefix.split('-')[0];
    const g = (gender || '').toLowerCase();
    const femaleKeywords = ['female','woman','girl','she','mrs','ms','female'];
    const maleKeywords = ['male','man','boy','he','mr','male'];

    function nameHasGender(name, checkFemale) {
      if (!name) return false;
      const n = name.toLowerCase();
      const kws = checkFemale ? femaleKeywords : maleKeywords;
      return kws.some(k => n.includes(k));
    }

    // 1) exact lang match + gender keyword in name
    let candidates = voices.filter(v => v.lang && (v.lang.toLowerCase() === langPrefix || v.lang.toLowerCase().startsWith(langPrefix)));
    if (candidates.length) {
      const byGender = candidates.find(v => nameHasGender(v.name, g === 'female')) || candidates.find(v => nameHasGender(v.name, g !== 'female'));
      if (byGender) return byGender;
    }

    // 2) any voice with language short prefix and gender keyword
    candidates = voices.filter(v => v.lang && v.lang.toLowerCase().startsWith(shortLang));
    if (candidates.length) {
      const byGender = candidates.find(v => nameHasGender(v.name, g === 'female')) || candidates[0];
      if (byGender) return byGender;
    }

    // 3) any voice with gender keyword regardless of language
    const byAnyGender = voices.find(v => nameHasGender(v.name, g === 'female'));
    if (byAnyGender) return byAnyGender;

    // 4) fallback: first voice that roughly matches language code
    const rough = voices.find(v => v.lang && v.lang.toLowerCase().startsWith(shortLang));
    if (rough) return rough;

    // 5) final fallback: first available voice
    return voices[0];
  }

  if (!text) return '';
  if (targetLangShort === 'en') return text;
  const endpoints = [
    'https://translate.argosopentech.com/translate',
    'https://libretranslate.de/translate'
  ];
  for (const url of endpoints) {
    try {
      const resp = await fetch(url, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ q: text, source: 'en', target: targetLangShort, format: 'text' })
      });
      if (!resp.ok) throw new Error('HTTP ' + resp.status);
      const data = await resp.json();
      const translated = data.translatedText || data.translated || data.result || null;
      if (translated) return translated;
    } catch (err) {
      console.warn('Translate endpoint failed', url, err);
      continue;
    }
  }
  return null; // all endpoints failed
}
